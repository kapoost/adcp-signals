# Fly.io deployment config — Purrsonality signal-provider (Cats variant).
# Bun workspace monorepo: core + cats are bundled, vanilla stays local-only
# as a reference signal for AdCP spec conformance testing.
# Region fra (Frankfurt) — co-located with seller (lowest cross-talk).

app = "purrsonality-signals"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PUBLIC_BASE_URL = "https://purrsonality-signals.fly.dev"

[http_service]
  internal_port = 3011
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0  # scale-to-zero — call volume is low + bursty
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  # 512mb (not the seller's 256mb) — SDK 9.x cold start crashes silently
  # under 256mb on Fly's shared-cpu-1x; the proxy times out before app
  # logs flush, so the failure is hard to attribute. Diagnosed during the
  # 7.10.1 → 9.0.0-beta.27 bump on 2026-06-08. Drop back to 256mb only
  # after confirming a future release fits the smaller envelope.
  memory = "512mb"
